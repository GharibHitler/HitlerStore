<script src="firebase-config.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);

    window.confirmOrder = async function() {
        const user = JSON.parse(localStorage.getItem("hs_user"));
        if(!user) { alert("يرجى تسجيل الدخول أولاً"); location.href="auth.html"; return; }

        // تأكد أن pkgActive و methodActive يتم تحديد قيمتهم في app.js عند اختيار باقة
        if(!window.pkgActive) { alert("اختار الباقة أولاً"); return; }

        const btn = document.querySelector(".mo-btn");
        btn.disabled = true; btn.innerText = "جاري إرسال طلبك...";

        const orderId = "ord_" + Date.now();
        const orderData = {
            id: orderId,
            uid: user.uid,
            name: user.realName,
            phone: user.phone,
            gameId: user.gameId,
            package: window.pkgActive, // الباقة (كائن يحتوي السعر والكمية)
            method: window.methodActive || "فودافون كاش",
            status: "pending",
            createdAt: Date.now(),
            messages: [{from:"system", text:"تم استلام طلبك، انتظر التفعيل.", ts:Date.now()}]
        };

        try {
            await setDoc(doc(db, "orders", orderId), orderData);
            alert("✅ تم إرسال طلبك بنجاح!");
            location.href = "order.html";
        } catch(e) {
            alert("❌ فشل الإرسال، راجع اتصالك");
            btn.disabled = false; btn.innerText = "تأكيد الطلب";
        }
    };
</script>
