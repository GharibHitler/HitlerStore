<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HITLERSTORE • طلباتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{overflow:hidden}
    .orders-list{display:flex;flex-direction:column;gap:0;overflow-y:auto;flex:1}
    .orders-list::-webkit-scrollbar{width:3px}
    .orders-list::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3)}
    .ord-item{padding:13px 16px;border-bottom:1px solid var(--rim2);cursor:pointer;transition:background var(--t)}
    .ord-item:hover,.ord-item.active{background:rgba(139,92,246,.07)}
    .ord-item-top{display:flex;align-items:center;gap:9px;margin-bottom:5px}
    .ord-item-pkg{font-size:.82rem;color:var(--mu)}
    .ord-item-pkg strong{color:var(--g);font-family:var(--fm)}
    .ord-name{font-weight:800;font-size:.9rem;flex:1;color:var(--wh)}
    .ord-time{font-size:.67rem;color:var(--mu);white-space:nowrap}
    .split{display:grid;grid-template-columns:280px 1fr;height:100%;overflow:hidden}
    .split-left{border-left:1px solid var(--rim2);display:flex;flex-direction:column;overflow:hidden}
    .split-head{padding:13px 16px;border-bottom:1px solid var(--rim2);font-size:.8rem;font-weight:800;color:var(--mu);flex-shrink:0;display:flex;align-items:center;gap:8px}
    .split-head span:first-child{color:var(--v2)}
    .split-right{display:flex;flex-direction:column;overflow:hidden}
    .no-order{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--mu);font-size:.9rem;padding:20px;text-align:center}
    .no-order .big-ico{font-size:3.5rem}
    /* mobile */
    @media(max-width:700px){
      .split{grid-template-columns:1fr}
      .split-left{display:none}
      .split-left.mob-show{display:flex}
      .split-right.mob-hide{display:none}
      .split-right.mob-show{display:flex}
    }
  </style>
</head>
<body>
<div class="chat-page" id="chatPage" style="display:none">
  <!-- TOP BAR -->
  <div class="chat-bar">
    <a href="index.html" class="chat-bar-back">← المتجر</a>
    <div class="chat-bar-logo">HS<em>.</em></div>
    <div class="chat-bar-status"><span class="chat-bar-dot"></span>متصل</div>
    <div id="barUser" style="font-size:.8rem;color:var(--mu);margin-right:auto"></div>
  </div>

  <div class="split" style="flex:1;overflow:hidden">
    <!-- LEFT: orders list -->
    <div class="split-left" id="splitLeft">
      <div class="split-head"><span>📋</span><span>طلباتي</span></div>
      <div class="orders-list" id="ordersList">
        <div style="padding:24px;text-align:center;color:var(--mu);font-size:.85rem">جاري التحميل...</div>
      </div>
    </div>

    <!-- RIGHT: chat -->
    <div class="split-right" id="splitRight">
      <div class="no-order" id="noOrder">
        <span class="big-ico">💬</span>
        <strong style="color:var(--wh)">اختر طلب من القائمة</strong>
        <span>أو اشترِ باقة جديدة من المتجر</span>
        <a href="index.html" class="btn-pri" style="margin-top:8px;padding:11px 22px;font-size:.9rem">← العودة للمتجر</a>
      </div>

      <!-- Chat area (hidden until order selected) -->
      <div id="chatArea" style="display:none;flex-direction:column;height:100%;overflow:hidden">
        <!-- order header -->
        <div style="padding:13px 16px;border-bottom:1px solid var(--rim2);flex-shrink:0">
          <div id="chatOrderInfo" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <div id="ordPkgName" style="font-weight:900;font-size:.95rem;color:var(--wh)"></div>
            <div id="ordPkgPrice" style="font-family:var(--fm);color:var(--g);font-size:.88rem"></div>
            <div id="ordStatus"></div>
          </div>
        </div>
        <!-- messages -->
        <div class="chat-body" id="chatBody"></div>
        <!-- input -->
        <div class="chat-input-bar">
          <textarea id="msgIn" placeholder="اكتب رسالتك..." rows="1"></textarea>
          <button id="sendBtn" onclick="sendMsg()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Not logged in -->
<div id="needLogin" style="display:none;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;text-align:center">
  <div style="font-size:3rem">🔒</div>
  <div style="font-family:var(--fd);font-size:1.3rem;font-weight:900;color:var(--wh)">سجّل دخولك أولاً</div>
  <p style="color:var(--mu);font-size:.9rem">عشان تشوف طلباتك محتاج تسجّل دخول</p>
  <a href="auth.html" class="btn-pri" style="padding:12px 28px">تسجيل الدخول →</a>
  <a href="index.html" style="font-size:.82rem;color:var(--mu)">← العودة للمتجر</a>
</div>

<script src="firebase-config.js"></script>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getFirestore,collection,query,where,orderBy,onSnapshot,doc,updateDoc,arrayUnion,serverTimestamp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const user = JSON.parse(localStorage.getItem("hs_user")||"null");

if(!user){
  document.getElementById("needLogin").style.display="flex";
} else {
  document.getElementById("chatPage").style.display="flex";
  document.getElementById("barUser").textContent = user.realName;

  const app = initializeApp(FIREBASE_CONFIG,"order");
  const db  = getFirestore(app);

  let activeId   = localStorage.getItem("hs_last_order")||null;
  let unsubChat  = null;

  // load all orders for this user
  const q = query(
    collection(db,"orders"),
    where("uid","==",user.uid),
    orderBy("createdAt","desc")
  );

  onSnapshot(q, snap => {
    const orders = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList(orders);
    if(activeId){
      const o = orders.find(x=>x.id===activeId);
      if(o) openOrder(o);
    } else if(orders.length){
      openOrder(orders[0]);
      activeId = orders[0].id;
    }
  });

  function renderList(orders){
    const list = document.getElementById("ordersList");
    if(!orders.length){
      list.innerHTML=`<div style="padding:20px;text-align:center;color:var(--mu);font-size:.83rem">لا توجد طلبات بعد<br/><a href="index.html" style="color:var(--v2);font-weight:800;margin-top:8px;display:block">اشترِ الآن ←</a></div>`;
      return;
    }
    list.innerHTML = orders.map(o=>{
      const ts = o.createdAt?.seconds ? new Date(o.createdAt.seconds*1000).toLocaleDateString("ar-EG",{day:"numeric",month:"short"}) : "—";
      return `<div class="ord-item${o.id===activeId?" active":""}" onclick="window._openOrd('${o.id}')">
        <div class="ord-item-top">
          <span class="ord-name">${o.package?.label||"طلب"}</span>
          <span class="ord-time">${ts}</span>
        </div>
        <div class="ord-item-pkg">السعر: <strong>${o.package?.price?.toLocaleString()||"—"} جنيه</strong></div>
        ${statusBadge(o.status)}
      </div>`;
    }).join("");
  }

  function statusBadge(s){
    if(s==="confirmed") return `<span class="status-badge sb-confirmed">✓ تم التأكيد</span>`;
    if(s==="done")      return `<span class="status-badge sb-done">✅ تم التوصيل</span>`;
    return `<span class="status-badge sb-pending">⏳ قيد المراجعة</span>`;
  }

  window._openOrd = function(id){
    activeId = id;
    localStorage.setItem("hs_last_order",id);
    // just trigger re-render via snapshot
    document.querySelectorAll(".ord-item").forEach(el=>{
      el.classList.toggle("active", el.getAttribute("onclick").includes(`'${id}'`));
    });
  };

  function openOrder(o){
    document.getElementById("noOrder").style.display  = "none";
    const ca = document.getElementById("chatArea");
    ca.style.display = "flex";

    document.getElementById("ordPkgName").textContent  = o.package?.label||"طلب";
    document.getElementById("ordPkgPrice").textContent = (o.package?.price?.toLocaleString()||"—")+" جنيه";
    document.getElementById("ordStatus").innerHTML     = statusBadge(o.status);

    if(unsubChat) unsubChat();
    // live messages
    unsubChat = onSnapshot(doc(db,"orders",o.id), snap2=>{
      if(!snap2.exists()) return;
      const data = snap2.data();
      renderMessages(data.messages||[]);
    });
  }

  function renderMessages(msgs){
    const body = document.getElementById("chatBody");
    body.innerHTML = msgs.map(m=>{
      if(m.from==="system") return `<div class="bubble sys">${m.text}</div>`;
      if(m.from==="admin")  return `<div class="bubble store"><div class="sender">HITLERSTORE</div>${m.text}</div>`;
      return `<div class="bubble me">${m.text}</div>`;
    }).join("");
    body.scrollTop = body.scrollHeight;
  }

  window.sendMsg = async function(){
    const inp = document.getElementById("msgIn");
    const text = inp.value.trim();
    if(!text || !activeId) return;
    inp.value=""; inp.style.height="";
    document.getElementById("sendBtn").disabled=true;
    try{
      await updateDoc(doc(db,"orders",activeId),{
        messages: arrayUnion({from:"customer",text,ts:Date.now()})
      });
    } catch(e){ console.error(e); }
    document.getElementById("sendBtn").disabled=false;
  };

  // textarea auto-resize + enter to send
  const msgIn = document.getElementById("msgIn");
  msgIn?.addEventListener("keydown",e=>{
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();window.sendMsg();}
  });
  msgIn?.addEventListener("input",function(){
    this.style.height="auto";
    this.style.height=Math.min(this.scrollHeight,100)+"px";
  });
}
</script>
</body>
</html>
