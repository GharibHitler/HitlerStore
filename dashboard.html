<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HITLERSTORE • Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{overflow:hidden}
    .db-page{display:none}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="db-login" id="dbLogin">
  <div class="db-login-box">
    <div class="db-logo">HITLER<em>STORE</em></div>
    <div class="db-sub">لوحة التحكم — الأدمن فقط</div>
    <input class="db-inp" id="dbPass" type="password" placeholder="كلمة المرور"/>
    <button class="db-login-btn" onclick="tryLogin()">دخول →</button>
    <div class="db-err" id="dbErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="db-page" id="dbPage">
  <!-- TOP BAR -->
  <div class="db-topbar">
    <div class="db-topbar-logo">HS<em>.</em> Dashboard</div>
    <div class="db-stats">
      <div class="db-stat"><span class="db-stat-n v" id="stAll">0</span><span class="db-stat-l">الكل</span></div>
      <div class="db-stat"><span class="db-stat-n g" id="stPend">0</span><span class="db-stat-l">معلّق</span></div>
      <div class="db-stat"><span class="db-stat-n gr" id="stDone">0</span><span class="db-stat-l">منجز</span></div>
    </div>
    <button class="db-sound" id="soundBtn" title="صوت">🔔</button>
    <button class="db-sound" onclick="doDbLogout()" title="خروج" style="color:var(--re)">⏻</button>
  </div>

  <!-- BODY -->
  <div class="db-body">
    <!-- SIDEBAR -->
    <div class="db-sidebar">
      <div class="db-sidebar-head">
        <div class="db-filters">
          <button class="db-filter on" onclick="setFilter('all')">الكل</button>
          <button class="db-filter" onclick="setFilter('pending')">معلّق</button>
          <button class="db-filter" onclick="setFilter('confirmed')">مؤكد</button>
          <button class="db-filter" onclick="setFilter('done')">منجز</button>
        </div>
      </div>
      <div class="db-list" id="dbList"></div>
    </div>

    <!-- CHAT PANEL -->
    <div class="db-chat" id="dbChat">
      <!-- empty state -->
      <div class="db-chat-empty" id="dbEmpty">
        <span>📬</span>
        <span>اختر طلب من القائمة</span>
      </div>

      <!-- order header (hidden initially) -->
      <div id="dbOrderHead" style="display:none" class="db-chat-head">
        <div class="db-customer-info">
          <div class="db-customer-name" id="dbCustName">—</div>
          <div class="db-info-grid" id="dbInfoGrid"></div>
        </div>
        <div class="db-status-btns">
          <button class="db-status-btn db-confirm" onclick="setStatus('confirmed')">✓ تأكيد</button>
          <button class="db-status-btn db-done" onclick="setStatus('done')">✅ منجز</button>
        </div>
      </div>

      <!-- messages -->
      <div class="db-msgs" id="dbMsgs"></div>

      <!-- input -->
      <div class="db-input-wrap" id="dbInputWrap" style="display:none">
        <div class="db-tpls" id="dbTpls"></div>
        <div class="db-inp-row">
          <textarea class="db-msg-inp" id="dbMsgIn" placeholder="اكتب ردك..." rows="1"></textarea>
          <button class="db-send" onclick="dbSend()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
import {initializeApp,getApps,getApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getFirestore,collection,query,orderBy,onSnapshot,doc,updateDoc,arrayUnion} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const TEMPLATES = ["تم استلام طلبك ✅","رقم الكاش: XXXX-XXXX","تم الشحن بنجاح 🎉","أرسل الإيصال من فضلك","رقم الموبايل المطلوب؟"];

// ── AUTH ──
const SESSION_KEY = "hs_admin_sess";
const SECRET      = STORE_CONFIG.adminKey;
const SESSION_H   = 8;
const MAX_TRIES   = 3;
const LOCK_MS     = 5*60*1000;

function getAttempts(){return JSON.parse(localStorage.getItem("hs_adm_att")||'{"c":0,"lock":0}');}
function addAttempt(){const a=getAttempts();a.c++;if(a.c>=MAX_TRIES)a.lock=Date.now()+LOCK_MS;localStorage.setItem("hs_adm_att",JSON.stringify(a));return a;}
function resetAttempts(){localStorage.removeItem("hs_adm_att");}
function hasSess(){const e=localStorage.getItem(SESSION_KEY);return e&&Date.now()<+e;}
function saveSess(){localStorage.setItem(SESSION_KEY,Date.now()+SESSION_H*3600000);}
function checkURL(){const p=new URLSearchParams(location.search);const ok=p.get("key")===SECRET;if(ok)history.replaceState({},"",location.pathname);return ok;}

if(hasSess()||checkURL()){
  saveSess();
  showDash();
} else {
  document.getElementById("dbPass").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
}

window.tryLogin=function(){
  const a=getAttempts();
  if(a.lock&&Date.now()<a.lock){
    const m=Math.ceil((a.lock-Date.now())/60000);
    document.getElementById("dbErr").textContent=`🔒 مقفّل ${m} دقائق`;
    return;
  }
  const p=document.getElementById("dbPass").value;
  if(p===STORE_CONFIG.adminPassword){
    resetAttempts();saveSess();showDash();
  } else {
    const at=addAttempt();
    const left=MAX_TRIES-at.c;
    document.getElementById("dbErr").textContent=left<=0?"🔒 مقفّل 5 دقائق":`كلمة المرور غلط (${left} محاولة)`;
    const box=document.querySelector(".db-login-box");
    box.style.animation="shake .4s ease";setTimeout(()=>box.style.animation="",400);
  }
};

window.doDbLogout=function(){localStorage.removeItem(SESSION_KEY);location.reload();};

// ── DASHBOARD ──
let allOrders=[], activeId=null, filterMode="all", soundOn=true, unsubActive=null;

function showDash(){
  document.getElementById("dbLogin").style.display="none";
  document.getElementById("dbPage").style.display="flex";
  initDash();
}

function initDash(){
  const app=getApps().find(a=>a.name==="dash")||initializeApp(FIREBASE_CONFIG,"dash");
  const db=getFirestore(app);

  // templates
  const tplDiv=document.getElementById("dbTpls");
  TEMPLATES.forEach(t=>{
    const b=document.createElement("button");
    b.className="db-tpl";b.textContent=t;
    b.onclick=()=>{document.getElementById("dbMsgIn").value=t;};
    tplDiv.appendChild(b);
  });

  // sound toggle
  document.getElementById("soundBtn").onclick=()=>{
    soundOn=!soundOn;
    document.getElementById("soundBtn").textContent=soundOn?"🔔":"🔕";
  };

  // realtime orders
  const q=query(collection(db,"orders"),orderBy("createdAt","desc"));
  onSnapshot(q,snap=>{
    const prev=allOrders.map(o=>o.id);
    allOrders=snap.docs.map(d=>({id:d.id,...d.data()}));

    // notify new orders
    allOrders.forEach(o=>{
      if(!prev.includes(o.id)){
        if(soundOn) playBeep();
        if(Notification.permission==="granted") new Notification("طلب جديد! 🔔",{body:`${o.customerName} — ${o.package?.label}`});
      }
    });

    updateStats();
    renderList();
    if(activeId){
      const o=allOrders.find(x=>x.id===activeId);
      if(o) renderChat(o);
    }
  });

  // textarea
  const inp=document.getElementById("dbMsgIn");
  inp?.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();dbSend();}});
  inp?.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,90)+"px";});

  // notifications
  if(Notification.permission==="default") Notification.requestPermission();
}

function playBeep(){
  try{
    const ctx=new AudioContext();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);
    o.start();o.stop(ctx.currentTime+0.2);
  } catch(e){}
}

function updateStats(){
  document.getElementById("stAll").textContent=allOrders.length;
  document.getElementById("stPend").textContent=allOrders.filter(o=>o.status==="pending").length;
  document.getElementById("stDone").textContent=allOrders.filter(o=>o.status==="done").length;
}

window.setFilter=function(f){
  filterMode=f;
  document.querySelectorAll(".db-filter").forEach(b=>b.classList.toggle("on",b.textContent.trim()===({all:"الكل",pending:"معلّق",confirmed:"مؤكد",done:"منجز"}[f])));
  renderList();
};

function statusBadge(s){
  if(s==="confirmed") return `<span class="db-badge confirmed">مؤكد</span>`;
  if(s==="done")      return `<span class="db-badge done">منجز</span>`;
  return `<span class="db-badge pending">معلّق</span>`;
}

function renderList(){
  const list=document.getElementById("dbList");
  const filtered=filterMode==="all"?allOrders:allOrders.filter(o=>o.status===filterMode);
  if(!filtered.length){
    list.innerHTML=`<div style="padding:20px;text-align:center;color:var(--mu);font-size:.83rem">لا توجد طلبات</div>`;
    return;
  }
  list.innerHTML=filtered.map(o=>{
    const ts=o.createdAt?.seconds?new Date(o.createdAt.seconds*1000).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}):"—";
    const lastMsg=o.messages?.filter(m=>m.from==="customer").slice(-1)[0];
    return `<div class="db-order${o.id===activeId?" active":""}" onclick="window._dbOpen('${o.id}')">
      <div class="db-order-top">
        <div class="db-order-avatar">${(o.customerName||"؟")[0]}</div>
        <span class="db-order-name">${o.customerName||"—"}</span>
        <span class="db-order-time">${ts}</span>
      </div>
      <div class="db-order-pkg">الباقة: <strong>${o.package?.label||"—"}</strong> · ${(o.package?.price||0).toLocaleString()} جنيه</div>
      <div class="db-order-foot">
        ${statusBadge(o.status)}
        ${lastMsg?`<span style="font-size:.71rem;color:var(--mu);margin-right:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px">${lastMsg.text}</span>`:""}
      </div>
    </div>`;
  }).join("");
}

window._dbOpen=function(id){
  activeId=id;
  const o=allOrders.find(x=>x.id===id);
  if(o) renderChat(o);
  renderList();
};

function renderChat(o){
  document.getElementById("dbEmpty").style.display     = "none";
  document.getElementById("dbOrderHead").style.display = "flex";
  document.getElementById("dbInputWrap").style.display = "block";

  // customer info
  document.getElementById("dbCustName").textContent = o.customerName||"—";
  document.getElementById("dbInfoGrid").innerHTML = `
    <div class="db-info-tag">📱 <strong>${o.phone||"—"}</strong></div>
    <div class="db-info-tag">🎮 ID: <strong>${o.gameId||"—"}</strong></div>
    <div class="db-info-tag">👤 لعبة: <strong>${o.gameName||"—"}</strong></div>
    <div class="db-info-tag">📦 <strong>${o.package?.label||"—"}</strong></div>
    <div class="db-info-tag">💰 <strong>${(o.package?.price||0).toLocaleString()} جنيه</strong></div>
    ${statusBadge(o.status)}
  `;

  // messages
  renderMsgs(o.messages||[]);
}

function renderMsgs(msgs){
  const body=document.getElementById("dbMsgs");
  body.innerHTML=msgs.map(m=>{
    if(m.from==="system") return `<div class="bubble sys">${m.text}</div>`;
    if(m.from==="admin")  return `<div class="bubble store"><div class="sender">أنت</div>${m.text}</div>`;
    return `<div class="bubble me">${m.text}</div>`;
  }).join("");
  body.scrollTop=body.scrollHeight;
}

window.setStatus=async function(s){
  if(!activeId)return;
  const app=getApps().find(a=>a.name==="dash")||initializeApp(FIREBASE_CONFIG,"dash");
  const db=getFirestore(app);
  await updateDoc(doc(db,"orders",activeId),{
    status:s,
    messages:arrayUnion({from:"system",text:s==="confirmed"?"✅ تم تأكيد الطلب":"🎉 تم توصيل الشدات بنجاح",ts:Date.now()})
  });
};

window.dbSend=async function(){
  const inp=document.getElementById("dbMsgIn");
  const text=inp.value.trim();
  if(!text||!activeId)return;
  inp.value="";inp.style.height="";
  const app=getApps().find(a=>a.name==="dash")||initializeApp(FIREBASE_CONFIG,"dash");
  const db=getFirestore(app);
  await updateDoc(doc(db,"orders",activeId),{
    messages:arrayUnion({from:"admin",text,ts:Date.now()})
  });
};
</script>
</body>
</html>
