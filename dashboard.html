<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Dashboard — Hitler Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Oxanium:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --black:#050608;--deep:#080c12;--dark:#0d1520;--card:#101828;--card2:#141f30;
      --orange:#FF6B00;--gold:#FFD700;--green:#25D366;--red:#FF1744;--cyan:#00E5FF;
      --white:#F0F4FF;--muted:#6B7FA3;--dim:#2A3550;
      --font-ar:'Tajawal',sans-serif;--font-d:'Oxanium',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font-ar);background:var(--black);color:var(--white);display:flex;flex-direction:column}

    /* ── LOGIN ── */
    #loginScreen{
      position:fixed;inset:0;z-index:999;
      background:var(--black);display:flex;align-items:center;justify-content:center;
    }
    .login-box{
      background:var(--card);border:1px solid rgba(255,107,0,.2);
      border-radius:20px;padding:40px 36px;text-align:center;width:320px;
      box-shadow:0 24px 80px rgba(0,0,0,.6);
    }
    .login-logo{font-family:var(--font-d);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:6px}
    .login-logo em{color:var(--orange);font-style:normal}
    .login-sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
    .login-box input{
      width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:10px;color:var(--white);font-family:var(--font-ar);font-size:.95rem;
      padding:11px 14px;outline:none;margin-bottom:12px;
    }
    .login-box input:focus{border-color:rgba(255,107,0,.4)}
    .login-btn{
      width:100%;background:linear-gradient(135deg,var(--orange),#ff8c00);
      border:none;border-radius:10px;color:#000;font-weight:900;font-size:1rem;
      padding:12px;cursor:pointer;font-family:var(--font-ar);
    }
    .login-error{color:var(--red);font-size:.85rem;margin-top:8px}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

    /* ── MAIN LAYOUT ── */
    #app{display:none;flex:1;overflow:hidden;flex-direction:column}
    #app.show{display:flex}

    /* Top Bar */
    .top-bar{
      background:rgba(8,12,18,.95);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,107,0,.1);
      padding:12px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;
    }
    .tb-logo{font-family:var(--font-d);font-size:1.1rem;font-weight:900;color:var(--white)}
    .tb-logo em{color:var(--orange);font-style:normal}
    .tb-bolt{width:30px;height:30px;background:linear-gradient(135deg,var(--orange),var(--gold));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
    .tb-stats{display:flex;gap:16px;margin-right:auto}
    .tb-stat{font-size:.82rem;color:var(--muted);font-weight:700}
    .tb-stat span{color:var(--orange);font-family:var(--font-d);font-size:.95rem}
    .tb-notif-btn{
      background:rgba(255,107,0,.1);border:1px solid rgba(255,107,0,.2);
      color:var(--orange);padding:6px 14px;border-radius:8px;
      font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--font-ar);
    }
    .notif-dot{
      width:8px;height:8px;background:var(--red);border-radius:50%;
      display:inline-block;margin-right:5px;animation:blink 1.2s ease-in-out infinite;
    }

    /* ── SPLIT VIEW ── */
    .main{display:flex;flex:1;overflow:hidden}

    /* Orders sidebar */
    #sidebar{
      width:320px;flex-shrink:0;
      border-left:1px solid rgba(255,255,255,.05);
      display:flex;flex-direction:column;
      background:var(--deep);
    }
    .sidebar-head{
      padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);
      display:flex;align-items:center;gap:10px;flex-shrink:0;
    }
    .sidebar-head h2{font-size:.95rem;font-weight:900;color:var(--white)}
    .orders-count{
      background:var(--orange);color:#000;
      padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:900;
      font-family:var(--font-d);
    }

    /* Filter tabs */
    .filter-tabs{
      display:flex;border-bottom:1px solid rgba(255,255,255,.05);
      flex-shrink:0;
    }
    .ftab{
      flex:1;padding:9px 4px;font-size:.78rem;font-weight:800;
      color:var(--muted);background:none;border:none;cursor:pointer;
      border-bottom:2px solid transparent;transition:.2s;font-family:var(--font-ar);
    }
    .ftab.active{color:var(--orange);border-bottom-color:var(--orange)}

    /* Order list */
    #ordersList{flex:1;overflow-y:auto;padding:8px}
    #ordersList::-webkit-scrollbar{width:4px}
    #ordersList::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

    .order-item{
      padding:12px 14px;border-radius:12px;margin-bottom:6px;
      background:var(--card);border:1px solid rgba(255,255,255,.05);
      cursor:pointer;transition:.2s;
    }
    .order-item:hover{border-color:rgba(255,107,0,.25);background:rgba(255,107,0,.05)}
    .order-item.active{border-color:var(--orange);background:rgba(255,107,0,.1)}
    .order-item.has-new{border-color:rgba(255,107,0,.4);position:relative}
    .order-item.has-new::before{
      content:'';position:absolute;top:10px;right:10px;
      width:8px;height:8px;background:var(--orange);border-radius:50%;
      animation:blink 1s ease-in-out infinite;
    }
    .oi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .oi-name{font-weight:800;font-size:.9rem;color:var(--white)}
    .oi-time{font-size:.72rem;color:var(--muted)}
    .oi-pkg{font-size:.82rem;color:var(--muted);margin-bottom:6px}
    .oi-footer{display:flex;justify-content:space-between;align-items:center}
    .oi-id{font-size:.72rem;color:var(--dim);font-family:var(--font-d)}

    /* Status badges */
    .sbadge{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 9px;border-radius:10px;font-size:.72rem;font-weight:800;
    }
    .sbadge.pending{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);color:var(--gold)}
    .sbadge.confirmed{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);color:var(--cyan)}
    .sbadge.done{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);color:var(--green)}

    /* ── CHAT PANEL ── */
    #chatPanel{
      flex:1;display:flex;flex-direction:column;overflow:hidden;
      background:var(--dark);
    }
    .chat-empty{
      flex:1;display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:12px;color:var(--muted);text-align:center;
    }
    .chat-empty-icon{font-size:3rem}

    /* Chat header */
    .chat-head{
      padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;gap:14px;flex-shrink:0;
      background:rgba(8,12,18,.6);
    }
    .ch-avatar{
      width:40px;height:40px;background:linear-gradient(135deg,var(--orange),var(--gold));
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;flex-shrink:0;
    }
    .ch-name{font-weight:900;font-size:.98rem;color:var(--white)}
    .ch-pkg{font-size:.8rem;color:var(--muted);margin-top:1px}
    .ch-actions{display:flex;gap:8px;margin-right:auto}
    .ch-btn{
      padding:7px 13px;border-radius:8px;font-size:.78rem;font-weight:800;
      cursor:pointer;border:1px solid;font-family:var(--font-ar);transition:.2s;
    }
    .ch-btn.confirm{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--cyan)}
    .ch-btn.confirm:hover{background:var(--cyan);color:#000}
    .ch-btn.done{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.3);color:var(--green)}
    .ch-btn.done:hover{background:var(--green);color:#fff}

    /* Messages */
    #messages{
      flex:1;overflow-y:auto;padding:16px 20px;
      display:flex;flex-direction:column;gap:10px;
    }
    #messages::-webkit-scrollbar{width:4px}
    #messages::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

    .msg{
      max-width:72%;padding:10px 14px;border-radius:16px;
      font-size:.9rem;line-height:1.55;animation:fadeUp .25s ease;
    }
    .msg.admin{
      background:linear-gradient(135deg,rgba(255,107,0,.2),rgba(255,107,0,.1));
      border:1px solid rgba(255,107,0,.25);
      align-self:flex-start;border-radius:16px 16px 16px 4px;
    }
    .msg.customer{
      background:var(--card);border:1px solid rgba(255,255,255,.07);
      align-self:flex-end;border-radius:16px 16px 4px 16px;
    }
    .msg.system{
      background:rgba(37,211,102,.07);border:1px solid rgba(37,211,102,.15);
      align-self:center;text-align:center;font-size:.82rem;
      color:rgba(37,211,102,.85);max-width:90%;border-radius:10px;
    }
    .msg-time{font-size:.68rem;color:var(--muted);margin-top:4px;text-align:left}

    /* Quick reply templates */
    .quick-templates{
      padding:8px 20px;border-top:1px solid rgba(255,255,255,.05);
      display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;
      background:rgba(8,12,18,.4);
    }
    .tpl-btn{
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      color:var(--muted);padding:5px 12px;border-radius:16px;
      font-size:.78rem;font-weight:700;cursor:pointer;font-family:var(--font-ar);transition:.2s;
    }
    .tpl-btn:hover{border-color:var(--orange);color:var(--orange)}

    /* Reply bar */
    .reply-bar{
      padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);
      display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
    }
    #adminInput{
      flex:1;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);border-radius:20px;
      color:var(--white);font-family:var(--font-ar);font-size:.93rem;
      padding:10px 16px;outline:none;resize:none;max-height:110px;
    }
    #adminInput:focus{border-color:rgba(255,107,0,.4)}
    #adminInput::placeholder{color:var(--muted)}
    .reply-send{
      width:42px;height:42px;background:linear-gradient(135deg,var(--orange),#ff8c00);
      border:none;border-radius:50%;color:#000;font-size:1rem;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:.2s;
    }
    .reply-send:hover{transform:scale(1.1)}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Sound button */
    #soundToggle{font-size:1.2rem;cursor:pointer;background:none;border:none;color:var(--muted);transition:.2s}
    #soundToggle:hover{color:var(--orange)}

    /* Responsive */
    @media(max-width:700px){
      #sidebar{width:100%;position:fixed;bottom:0;left:0;right:0;height:50vh;z-index:10;border-top:1px solid rgba(255,107,0,.2)}
      #chatPanel{height:50vh}
      .main{flex-direction:column}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">HITLER<em>STORE</em></div>
    <div class="login-sub">لوحة التحكم</div>
    <input type="password" id="passInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="tb-bolt">⚡</div>
    <div class="tb-logo">HITLER<em>STORE</em> — Dashboard</div>
    <div class="tb-stats">
      <div class="tb-stat">الكل: <span id="statAll">0</span></div>
      <div class="tb-stat">جديد: <span id="statPending">0</span></div>
      <div class="tb-stat">تمّ: <span id="statDone">0</span></div>
    </div>
    <button id="soundToggle" title="الصوت">🔔</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-head">
        <h2>الطلبات</h2>
        <span class="orders-count" id="ordersCount">0</span>
      </div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="filterOrders('all',this)">الكل</button>
        <button class="ftab" onclick="filterOrders('pending',this)">جديد</button>
        <button class="ftab" onclick="filterOrders('confirmed',this)">مؤكد</button>
        <button class="ftab" onclick="filterOrders('done',this)">تمّ</button>
      </div>
      <div id="ordersList"></div>
    </div>

    <!-- Chat Panel -->
    <div id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div>اختر طلب من القائمة لتبدأ المحادثة</div>
      </div>
      <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden">
        <div class="chat-head" id="chatHead"></div>
        <div id="messages"></div>
        <div class="quick-templates" id="quickTemplates"></div>
        <div class="reply-bar">
          <textarea id="adminInput" rows="1" placeholder="اكتب ردك..."
            oninput="autoResize(this)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
          <button class="reply-send" onclick="sendReply()">➤</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- AUDIO (notification sound) -->
<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, onSnapshot, doc,
    updateDoc, arrayUnion, orderBy, query, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  await import("./firebase-config.js");
  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  // ── State ──
  let allOrders   = [];
  let activeId    = null;
  let filterMode  = "all";
  let soundOn     = true;
  let seenMsgCounts = {};

  const TEMPLATES = [
    "رقم الكاش: 01XXXXXXXXXX 💳",
    "لو حوّلت من فضلك ابعت screenshot التحويل 📸",
    "تم استلام التحويل، جاري الشحن الآن ⚡",
    "تمت عملية الشحن بنجاح 🎉 افتح اللعبة تلاقي شدتك!",
    "في أي سؤال تاني؟ 😊",
  ];

  // ══ 3-LAYER SECURITY ══

  // Layer 1: Secret URL token — add ?key=YOUR_SECRET to the URL
  const SECRET_URL_KEY = "hs2025xOwner";   // ← غيّر هذا السر
  const SESSION_HOURS  = 8;                // ← مدة الجلسة بالساعات

  function checkURLKey() {
    const params = new URLSearchParams(location.search);
    return params.get("key") === SECRET_URL_KEY;
  }

  function checkSession() {
    const exp = localStorage.getItem("hs_admin_exp");
    return exp && Date.now() < parseInt(exp);
  }

  function saveSession() {
    localStorage.setItem("hs_admin_exp", Date.now() + SESSION_HOURS * 3600000);
  }

  function clearSession() {
    localStorage.removeItem("hs_admin_exp");
  }

  // Layer 2: Brute-force protection
  const MAX_ATTEMPTS = 3;
  const LOCKOUT_MS   = 5 * 60 * 1000; // 5 دقائق

  function getAttempts() {
    return JSON.parse(localStorage.getItem("hs_login_attempts") || '{"count":0,"lockUntil":0}');
  }
  function addAttempt() {
    const a = getAttempts();
    a.count++;
    if (a.count >= MAX_ATTEMPTS) a.lockUntil = Date.now() + LOCKOUT_MS;
    localStorage.setItem("hs_login_attempts", JSON.stringify(a));
    return a;
  }
  function resetAttempts() {
    localStorage.removeItem("hs_login_attempts");
  }

  // ── Auto-login if session valid OR url key present ──
  (function autoLogin() {
    if (checkSession() || checkURLKey()) {
      saveSession();
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").classList.add("show");
      setTimeout(() => { initDashboard(); requestNotifPermission(); }, 10);
    } else {
      // Hide URL key from address bar
      if (location.search) history.replaceState({}, "", location.pathname);
    }
  })();

  window.doLogin = function() {
    // Check lockout
    const att = getAttempts();
    if (att.lockUntil && Date.now() < att.lockUntil) {
      const mins = Math.ceil((att.lockUntil - Date.now()) / 60000);
      document.getElementById("loginErr").textContent = `🔒 محاولات كتير! انتظر ${mins} دقيقة`;
      return;
    }

    const pass = document.getElementById("passInput").value;
    if (pass === STORE_CONFIG.adminPassword) {
      resetAttempts();
      saveSession();
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").classList.add("show");
      initDashboard();
      requestNotifPermission();
    } else {
      const a = addAttempt();
      const left = MAX_ATTEMPTS - a.count;
      if (left <= 0) {
        document.getElementById("loginErr").textContent = `🔒 تم القفل لمدة 5 دقائق`;
      } else {
        document.getElementById("loginErr").textContent = `كلمة المرور غلط! (${left} محاولة متبقية)`;
      }
      // Shake animation
      const box = document.querySelector(".login-box");
      box.style.animation = "shake .4s ease";
      setTimeout(() => box.style.animation = "", 400);
    }
  };

  function requestNotifPermission() {
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  }

  // ── Init ──
  function initDashboard() {
    const q = query(collection(db, "orders"), orderBy("createdAt","desc"));
    onSnapshot(q, snap => {
      const prev = allOrders.map(o=>o.id);
      allOrders = snap.docs.map(d => ({ id:d.id, ...d.data() }));

      // New order notification
      allOrders.forEach(o => {
        if (!prev.includes(o.id)) {
          playSound();
          pushNotif(`طلب جديد! 🔔`, `${o.customerName} — ${o.package?.label}`);
        }
        // New message from customer
        const msgs = o.messages || [];
        const prevCount = seenMsgCounts[o.id] || 0;
        const newMsgs = msgs.slice(prevCount).filter(m=>m.from==="customer");
        if (newMsgs.length && o.id !== activeId) {
          playSound();
          pushNotif(`رسالة جديدة من ${o.customerName} 💬`, newMsgs[newMsgs.length-1].text);
          markHasNew(o.id);
        }
        seenMsgCounts[o.id] = msgs.length;
      });

      updateStats();
      renderSidebar();
      if (activeId) renderChat(activeId);
    });

    // Templates
    const tplEl = document.getElementById("quickTemplates");
    TEMPLATES.forEach(t => {
      const b = document.createElement("button");
      b.className="tpl-btn"; b.textContent=t;
      b.onclick = () => { document.getElementById("adminInput").value=t; };
      tplEl.appendChild(b);
    });

    // Sound toggle
    document.getElementById("soundToggle").onclick = () => {
      soundOn = !soundOn;
      document.getElementById("soundToggle").textContent = soundOn ? "🔔" : "🔕";
    };
  }

  function updateStats() {
    document.getElementById("statAll").textContent     = allOrders.length;
    document.getElementById("statPending").textContent = allOrders.filter(o=>o.status==="pending").length;
    document.getElementById("statDone").textContent    = allOrders.filter(o=>o.status==="done").length;
    document.getElementById("ordersCount").textContent = allOrders.length;
  }

  function renderSidebar() {
    const list = document.getElementById("ordersList");
    const filtered = filterMode==="all" ? allOrders : allOrders.filter(o=>o.status===filterMode);
    list.innerHTML = "";
    if (!filtered.length) {
      list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px;font-size:.88rem">لا توجد طلبات</div>`;
      return;
    }
    filtered.forEach(o => {
      const div = document.createElement("div");
      div.className = `order-item${o.id===activeId?" active":""}`;
      div.id = `oi-${o.id}`;
      const ts = o.createdAt?.seconds ? new Date(o.createdAt.seconds*1000).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}) : "";
      const statusLabels = {pending:"⏳ جديد",confirmed:"✅ مؤكد",done:"🎉 تمّ"};
      div.innerHTML = `
        <div class="oi-top">
          <div class="oi-name">👤 ${o.customerName||"عميل"}</div>
          <div class="oi-time">${ts}</div>
        </div>
        <div class="oi-pkg">📦 ${o.package?.label||""} — ${o.package?.price?.toLocaleString()||""}  جنيه</div>
        <div class="oi-footer">
          <div class="oi-id">#${o.id.slice(-8).toUpperCase()}</div>
          <div class="sbadge ${o.status}">${statusLabels[o.status]||o.status}</div>
        </div>`;
      div.onclick = () => openChat(o.id);
      list.appendChild(div);
    });
  }

  function markHasNew(id) {
    const el = document.getElementById("oi-"+id);
    if (el) el.classList.add("has-new");
  }

  // ── Open Chat ──
  window.openChat = function(id) {
    activeId = id;
    const el = document.getElementById("oi-"+id);
    if (el) el.classList.remove("has-new");
    document.querySelectorAll(".order-item").forEach(e=>e.classList.remove("active"));
    if (el) el.classList.add("active");
    document.getElementById("chatEmpty").style.display = "none";
    const cv = document.getElementById("chatView");
    cv.style.display = "flex"; cv.style.flexDirection = "column";
    renderChat(id);
  };

  function renderChat(id) {
    const order = allOrders.find(o=>o.id===id);
    if (!order) return;

    // Header
    const statusLabels = {pending:"⏳ جديد",confirmed:"✅ مؤكد",done:"🎉 تمّ"};
    document.getElementById("chatHead").innerHTML = `
      <div class="ch-avatar">${(order.customerName||"؟")[0]}</div>
      <div>
        <div class="ch-name">${order.customerName||"عميل"}</div>
        <div class="ch-pkg">📦 ${order.package?.label} | 🎮 ID: ${order.gameId} | اسم: ${order.gameName}</div>
      </div>
      <div class="ch-actions">
        ${order.status==="pending" ? `<button class="ch-btn confirm" onclick="updateStatus('${id}','confirmed')">✅ تأكيد</button>` : ""}
        ${order.status!=="done"    ? `<button class="ch-btn done" onclick="updateStatus('${id}','done')">🎉 تمّ الشحن</button>` : ""}
      </div>`;

    // Messages
    const msgs = order.messages || [];
    const container = document.getElementById("messages");
    container.innerHTML = "";
    msgs.forEach(m => {
      const d = document.createElement("div");
      d.className = `msg ${m.from==="admin"?"admin":m.from==="customer"?"customer":"system"}`;
      const time = m.ts ? new Date(m.ts).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}) : "";
      d.innerHTML = `${m.text}<div class="msg-time">${time}</div>`;
      container.appendChild(d);
    });
    container.scrollTop = container.scrollHeight;
    seenMsgCounts[id] = msgs.length;
  }

  // ── Send Reply ──
  window.sendReply = async function() {
    const input = document.getElementById("adminInput");
    const text  = input.value.trim();
    if (!text || !activeId) return;
    input.value = ""; autoResize(input);

    await updateDoc(doc(db,"orders",activeId), {
      messages: arrayUnion({ from:"admin", text, ts: Date.now() })
    });
  };

  // ── Update Status ──
  window.updateStatus = async function(id, status) {
    const labels = { confirmed:"✅ تم تأكيد الطلب", done:"🎉 تم الشحن بنجاح!" };
    await updateDoc(doc(db,"orders",id), {
      status,
      messages: arrayUnion({ from:"system", text: labels[status]||status, ts: Date.now() })
    });
  };

  // ── Filter ──
  window.filterOrders = function(mode, el) {
    filterMode = mode;
    document.querySelectorAll(".ftab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    renderSidebar();
  };

  // ── Sound & Notif ──
  function playSound() {
    if (!soundOn) return;
    try { document.getElementById("notifSound").play(); } catch(e){}
  }
  function pushNotif(title, body) {
    if (Notification.permission==="granted") {
      new Notification(title, { body, icon:"https://img.icons8.com/fluency/48/lightning-bolt.png" });
    }
  }
</script>

<script>
  function autoResize(el){
    el.style.height="auto";
    el.style.height=Math.min(el.scrollHeight,110)+"px";
  }
</script>
</body>
</html>
