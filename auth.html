<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HITLERSTORE • تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="hero-glow"></div>
<div class="hero-grid"></div>

<!-- NAV simple -->
<nav id="nav" class="stuck">
  <div class="nav-in">
    <a href="index.html" class="nav-logo">HS<em>.</em></a>
    <div style="margin-right:auto"></div>
    <a href="index.html" class="nav-login">← العودة للمتجر</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">HITLER<em>STORE</em></div>
    <div class="auth-tagline">مرحباً بك — سجّل أو أنشئ حساب جديد</div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab on" id="tabIn" onclick="showTab('in')">تسجيل الدخول</button>
      <button class="auth-tab" id="tabUp" onclick="showTab('up')">حساب جديد</button>
    </div>

    <!-- SIGN IN -->
    <div id="formIn">
      <div class="auth-form">
        <div>
          <label class="auth-label">رقم الموبايل</label>
          <input class="auth-inp" id="inPhone" type="tel" placeholder="01xxxxxxxxx" inputmode="numeric"/>
        </div>
        <div>
          <label class="auth-label">كلمة المرور</label>
          <input class="auth-inp" id="inPass" type="password" placeholder="••••••••"/>
        </div>
        <div class="auth-err" id="inErr"></div>
        <button class="auth-submit" id="inBtn" onclick="doSignIn()">دخول →</button>
      </div>
      <div class="auth-switch">مالكش حساب؟ <a onclick="showTab('up')">أنشئ واحد</a></div>
    </div>

    <!-- SIGN UP -->
    <div id="formUp" style="display:none">
      <div class="auth-form">
        <div>
          <label class="auth-label">الاسم الحقيقي</label>
          <input class="auth-inp" id="upReal" type="text" placeholder="أحمد محمد"/>
        </div>
        <div>
          <label class="auth-label">رقم الموبايل</label>
          <input class="auth-inp" id="upPhone" type="tel" placeholder="01xxxxxxxxx" inputmode="numeric"/>
        </div>
        <div class="auth-divider">بيانات اللعبة</div>
        <div>
          <label class="auth-label">Player ID</label>
          <input class="auth-inp" id="upPID" type="text" placeholder="123456789" inputmode="numeric"/>
        </div>
        <div>
          <label class="auth-label">اسمك في اللعبة</label>
          <input class="auth-inp" id="upGN" type="text" placeholder="Pro_Player"/>
        </div>
        <div class="auth-divider">كلمة المرور</div>
        <div>
          <label class="auth-label">كلمة المرور (6 أرقام/حروف على الأقل)</label>
          <input class="auth-inp" id="upPass" type="password" placeholder="••••••••"/>
        </div>
        <div>
          <label class="auth-label">تأكيد كلمة المرور</label>
          <input class="auth-inp" id="upPass2" type="password" placeholder="••••••••"/>
        </div>
        <div class="auth-err" id="upErr"></div>
        <div class="auth-ok" id="upOk"></div>
        <button class="auth-submit" id="upBtn" onclick="doSignUp()">إنشاء الحساب →</button>
      </div>
      <div class="auth-switch">عندك حساب بالفعل؟ <a onclick="showTab('in')">سجّل دخول</a></div>
    </div>

  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, query, collection, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(FIREBASE_CONFIG, "auth");
const db  = getFirestore(app);

// redirect if already logged in
const sess = localStorage.getItem("hs_user");
if(sess){ window.location.href = "index.html"; }

// Tab from URL
const urlTab = new URLSearchParams(location.search).get("tab");
if(urlTab === "signup") showTab("up");

function showTab(t){
  document.getElementById("tabIn").classList.toggle("on", t==="in");
  document.getElementById("tabUp").classList.toggle("on", t==="up");
  document.getElementById("formIn").style.display = t==="in" ? "" : "none";
  document.getElementById("formUp").style.display = t==="up" ? "" : "none";
}
window.showTab = showTab;

function err(id, msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add("show"); }
function clearErr(id){ const e=document.getElementById(id); e.textContent=""; e.classList.remove("show"); }
function ok(id, msg){ const e=document.getElementById(id); e.textContent=msg; e.classList.add("show"); }
function loading(id, on){ document.getElementById(id).disabled=on; document.getElementById(id).textContent = on ? "جاري..." : (id==="inBtn" ? "دخول →" : "إنشاء الحساب →"); }

// normalize phone: strip leading zeros, spaces
function normPhone(p){ return p.replace(/\s/g,"").replace(/^0+/,""); }

window.doSignIn = async function(){
  clearErr("inErr");
  const phone = normPhone(document.getElementById("inPhone").value.trim());
  const pass  = document.getElementById("inPass").value;
  if(!phone || !pass){ err("inErr","أدخل رقم الموبايل وكلمة المرور"); return; }
  loading("inBtn", true);
  try{
    const q2 = query(collection(db,"users"), where("phone","==",phone));
    const snap = await getDocs(q2);
    if(snap.empty){ err("inErr","رقم الموبايل غير مسجّل"); loading("inBtn",false); return; }
    const userDoc = snap.docs[0].data();
    if(userDoc.password !== btoa(pass)){ err("inErr","كلمة المرور غلط"); loading("inBtn",false); return; }
    // save session
    localStorage.setItem("hs_user", JSON.stringify({
      uid: snap.docs[0].id,
      realName: userDoc.realName,
      phone: userDoc.phone,
      gameId: userDoc.gameId,
      gameName: userDoc.gameName
    }));
    window.location.href = "index.html";
  } catch(e){
    console.error(e);
    err("inErr","حصل خطأ، جرب تاني");
    loading("inBtn",false);
  }
};

window.doSignUp = async function(){
  clearErr("upErr");
  const realName = document.getElementById("upReal").value.trim();
  const phone    = normPhone(document.getElementById("upPhone").value.trim());
  const gameId   = document.getElementById("upPID").value.trim();
  const gameName = document.getElementById("upGN").value.trim();
  const pass     = document.getElementById("upPass").value;
  const pass2    = document.getElementById("upPass2").value;

  if(!realName || !phone || !gameId || !gameName || !pass){ err("upErr","أكمل جميع الحقول"); return; }
  if(pass.length < 6){ err("upErr","كلمة المرور أقل من 6 خانات"); return; }
  if(pass !== pass2){ err("upErr","كلمتا المرور غير متطابقتين"); return; }
  if(!/^[0-9]{9,11}$/.test(phone)){ err("upErr","رقم الموبايل غير صحيح"); return; }

  loading("upBtn",true);
  try{
    // check if phone already registered
    const q2 = query(collection(db,"users"), where("phone","==",phone));
    const snap = await getDocs(q2);
    if(!snap.empty){ err("upErr","الرقم ده مسجّل بالفعل — سجّل دخول"); loading("upBtn",false); return; }

    const uid = "u_" + Date.now() + "_" + Math.random().toString(36).slice(2,6);
    await setDoc(doc(db,"users",uid),{
      uid, realName, phone, gameId, gameName,
      password: btoa(pass),   // base64 — not secure for prod but works for this use case
      createdAt: Date.now()
    });

    ok("upOk","✅ تم إنشاء الحساب! جاري تحويلك...");
    localStorage.setItem("hs_user", JSON.stringify({ uid, realName, phone, gameId, gameName }));
    setTimeout(()=>{ window.location.href="index.html"; }, 1200);
  } catch(e){
    console.error(e);
    err("upErr","حصل خطأ، جرب تاني");
    loading("upBtn",false);
  }
};
</script>
</body>
</html>
