<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HITLERSTORE • لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ستايل سريع للوحة التحكم */
        .db-container { padding: 20px; max-width: 1200px; margin: auto; }
        .order-card { 
            background: var(--card); border: 1px solid var(--rim); 
            padding: 20px; border-radius: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-info b { color: var(--v2); }
        .status-btn { 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; border: none;
            font-family: var(--fa); font-weight: bold; margin-right: 5px;
        }
        .btn-confirm { background: var(--gr); color: white; }
        .btn-cancel { background: var(--re); color: white; }
        .db-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        #loginOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="auth-box">
            <h3>دخول الإدارة</h3>
            <input type="password" id="adminPassInp" class="auth-inp" placeholder="كلمة مرور الأدمن">
            <button onclick="checkAdmin()" class="auth-btn">دخول</button>
        </div>
    </div>

    <div class="db-container">
        <div class="db-header">
            <h1>لوحة تحكم الطلبات 🛡️</h1>
            <button onclick="location.href='index.html'" class="nav-login">العودة للمتجر</button>
        </div>

        <div id="ordersList">
            <p>جاري تحميل الطلبات...</p>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);

        // 1. التحقق من كلمة مرور الأدمن
        window.checkAdmin = () => {
            const pass = document.getElementById("adminPassInp").value;
            if(pass === STORE_CONFIG.adminPassword) {
                document.getElementById("loginOverlay").style.display = "none";
                loadOrders();
            } else {
                alert("كلمة المرور غلط يا زعيم!");
            }
        };

        // 2. جلب الطلبات بشكل لحظي (Real-time)
        function loadOrders() {
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("ordersList");
                if (snapshot.empty) {
                    list.innerHTML = "<p>مفيش طلبات حالياً.</p>";
                    return;
                }

                list.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const o = docSnap.data();
                    const card = document.createElement("div");
                    card.className = "order-card";
                    card.innerHTML = `
                        <div class="order-info">
                            <p>👤 العميل: <b>${o.name || 'مجهول'}</b> (${o.phone})</p>
                            <p>🆔 الأيدي: <b>${o.gameId}</b></p>
                            <p>📦 الطلب: <span style="color:var(--g)">${o.package.label || o.package}</span></p>
                            <p>💰 السعر: ${o.package.price || '---'} EGP</p>
                            <p>📅 التاريخ: ${new Date(o.createdAt).toLocaleString('ar-EG')}</p>
                            <p>Status: <b style="color:${o.status==='confirmed'?'#10B981':'#F59E0B'}">${o.status}</b></p>
                        </div>
                        <div class="order-actions">
                            <button class="status-btn btn-confirm" onclick="updateStatus('${o.id}', 'confirmed')">تأكيد وشحن</button>
                            <button class="status-btn btn-cancel" onclick="deleteOrder('${o.id}')">حذف</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        // 3. تحديث حالة الطلب (مثلاً تم الشحن)
        window.updateStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
                alert("تم تحديث الطلب ✅");
            } catch(e) { alert("خطأ في التحديث"); }
        };

        // 4. حذف الطلب
        window.deleteOrder = async (id) => {
            if(confirm("عايز تمسح الطلب ده؟")) {
                await deleteDoc(doc(db, "orders", id));
            }
        };
    </script>
</body>
</html>
