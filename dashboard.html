<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hitler Store • Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body{overflow:hidden;}
.db-page{display:none;}
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- LOGIN -->
<div class="db-login" id="dbLogin">
  <div class="db-login-box">
    <div class="db-logo">HITLER<em>STORE</em></div>
    <div class="db-sub">لوحة التحكم — الأدمن فقط</div>
    <input class="db-inp" id="dbPass" type="password" placeholder="كلمة المرور"/>
    <button class="db-login-btn" onclick="tryLogin()">دخول →</button>
    <div class="db-err" id="dbErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="db-page" id="dbPage">
  <div class="db-topbar">
    <div class="db-stats">
      <div class="db-stat"><span class="db-stat-n v" id="stAll">0</span><span class="db-stat-l">الكل</span></div>
      <div class="db-stat"><span class="db-stat-n g" id="stPend">0</span><span class="db-stat-l">معلّق</span></div>
      <div class="db-stat"><span class="db-stat-n gr" id="stDone">0</span><span class="db-stat-l">منجز</span></div>
    </div>
    <div class="db-topbar-logo">HS<em style="color:var(--accent2);font-style:normal;">.</em> Dashboard</div>
    <button class="db-sound" onclick="doDbLogout()" title="خروج" style="color:var(--red);margin-right:8px;">⏻</button>
    <a href="index.html" class="db-sound" title="المتجر" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">🏪</a>
  </div>

  <div class="db-body">
    <!-- SIDEBAR -->
    <div class="db-sidebar">
      <div class="db-sidebar-head">
        <div class="db-filters">
          <button class="db-filter on" onclick="setFilter('all')">الكل</button>
          <button class="db-filter" onclick="setFilter('pending')">معلّق</button>
          <button class="db-filter" onclick="setFilter('confirmed')">مؤكد</button>
          <button class="db-filter" onclick="setFilter('done')">منجز</button>
        </div>
      </div>
      <div class="db-list" id="dbList">
        <div style="padding:24px;text-align:center;color:var(--muted);font-size:.82rem">لا توجد طلبات بعد</div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="db-chat" id="dbChat">
      <div class="db-chat-empty" id="dbEmpty">
        <span>📬</span>
        <span>اختر طلب من القائمة</span>
      </div>
      <div id="dbOrderHead" style="display:none" class="db-chat-head">
        <div class="db-customer-info">
          <div class="db-customer-name" id="dbCustName">—</div>
          <div class="db-info-grid" id="dbInfoGrid"></div>
        </div>
        <div class="db-status-btns">
          <button class="db-status-btn db-confirm" onclick="setStatus('confirmed')">✓ تأكيد</button>
          <button class="db-status-btn db-done" onclick="setStatus('done')">✅ منجز</button>
        </div>
      </div>
      <div class="db-msgs" id="dbMsgs"></div>
      <div class="db-input-wrap" id="dbInputWrap" style="display:none">
        <div class="db-tpls" id="dbTpls"></div>
        <div class="db-inp-row">
          <textarea class="db-msg-inp" id="dbMsgIn" placeholder="اكتب ردك..." rows="1"></textarea>
          <button class="db-send" onclick="dbSend()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
/* ── AUTH ── */
const SESS_KEY="hs_admin_sess";
const MAX_TRIES=3;
const LOCK_MS=5*60*1000;

function getAttempts(){return JSON.parse(localStorage.getItem("hs_adm_att")||'{"c":0,"lock":0}');}
function addAttempt(){const a=getAttempts();a.c++;if(a.c>=MAX_TRIES)a.lock=Date.now()+LOCK_MS;localStorage.setItem("hs_adm_att",JSON.stringify(a));return a;}
function resetAttempts(){localStorage.removeItem("hs_adm_att");}
function hasSess(){const e=localStorage.getItem(SESS_KEY);return e&&Date.now()<+e;}
function saveSess(){localStorage.setItem(SESS_KEY,Date.now()+8*3600000);}

if(hasSess()){saveSess();showDash();}
else{document.getElementById("dbPass").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});}

function tryLogin(){
  const a=getAttempts();
  if(a.lock&&Date.now()<a.lock){
    const m=Math.ceil((a.lock-Date.now())/60000);
    document.getElementById("dbErr").textContent=`🔒 مقفّل ${m} دقائق`;return;
  }
  const p=document.getElementById("dbPass").value;
  if(p===ADMIN_PASS){
    resetAttempts();saveSess();showDash();
  } else {
    const at=addAttempt();
    const left=MAX_TRIES-at.c;
    document.getElementById("dbErr").textContent=left<=0?"🔒 مقفّل 5 دقائق":`كلمة المرور غلط (${left} محاولة)`;
    const box=document.querySelector(".db-login-box");
    box.style.animation="shake .4s ease";setTimeout(()=>box.style.animation="",400);
  }
}

function doDbLogout(){localStorage.removeItem(SESS_KEY);location.reload();}

/* ── DASHBOARD ── */
let orders=[], activeId=null, filterMode="all";
const TEMPLATES=["تم استلام طلبك ✅","رقم الكاش: XXXX-XXXX","تم الشحن بنجاح 🎉","أرسل الإيصال من فضلك","رقم الموبايل المطلوب؟","سيتم التواصل معاك قريباً ⚡"];
const ORDERS_KEY="hs_orders";

function loadOrders(){
  orders=JSON.parse(localStorage.getItem(ORDERS_KEY)||"[]");
  updateStats();renderList();
}

function saveOrders(){
  localStorage.setItem(ORDERS_KEY,JSON.stringify(orders));
}

function showDash(){
  document.getElementById("dbLogin").style.display="none";
  document.getElementById("dbPage").style.display="flex";
  initDash();
}

function initDash(){
  // templates
  const tDiv=document.getElementById("dbTpls");
  TEMPLATES.forEach(t=>{
    const b=document.createElement("button");
    b.className="db-tpl";b.textContent=t;
    b.onclick=()=>{document.getElementById("dbMsgIn").value=t;};
    tDiv.appendChild(b);
  });

  // textarea
  const inp=document.getElementById("dbMsgIn");
  inp?.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();dbSend();}});
  inp?.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,90)+"px";});

  // poll for new orders from telegram bot (every 5s)
  loadOrders();
  setInterval(pollTelegram,5000);
  pollTelegram();
}

/* Poll Telegram for new orders */
let lastUpdateId=parseInt(localStorage.getItem("hs_last_upd")||"0");

async function pollTelegram(){
  try{
    const res=await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${lastUpdateId+1}&timeout=1`);
    const data=await res.json();
    if(!data.ok||!data.result.length)return;
    data.result.forEach(upd=>{
      lastUpdateId=upd.update_id;
      // We don't need to parse messages here since orders come from the store
      // This is just to keep offset updated
    });
    localStorage.setItem("hs_last_upd",lastUpdateId);
  }catch(e){}
}

function updateStats(){
  document.getElementById("stAll").textContent=orders.length;
  document.getElementById("stPend").textContent=orders.filter(o=>o.status==="pending").length;
  document.getElementById("stDone").textContent=orders.filter(o=>o.status==="done").length;
}

function setFilter(f){
  filterMode=f;
  document.querySelectorAll(".db-filter").forEach(b=>b.classList.toggle("on",
    b.textContent.trim()==={all:"الكل",pending:"معلّق",confirmed:"مؤكد",done:"منجز"}[f]
  ));
  renderList();
}

function statusBadge(s){
  if(s==="confirmed")return`<span class="db-badge confirmed">مؤكد</span>`;
  if(s==="done")return`<span class="db-badge done">منجز</span>`;
  return`<span class="db-badge pending">معلّق</span>`;
}

function renderList(){
  const list=document.getElementById("dbList");
  const filtered=filterMode==="all"?orders:orders.filter(o=>o.status===filterMode);
  if(!filtered.length){
    list.innerHTML=`<div style="padding:24px;text-align:center;color:var(--muted);font-size:.82rem">لا توجد طلبات</div>`;
    return;
  }
  list.innerHTML=filtered.map(o=>{
    const ts=o.createdAt?new Date(o.createdAt).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}):"—";
    return`<div class="db-order${o.id===activeId?" active":""}" onclick="openOrder('${o.id}')">
      <div class="db-order-top">
        <div class="db-order-avatar">${(o.name||"؟")[0]}</div>
        <span class="db-order-name">${o.name||"—"}</span>
        <span class="db-order-time">${ts}</span>
      </div>
      <div class="db-order-pkg">📦 ${o.pkg||"—"} · ${(o.price||0).toLocaleString()} جنيه</div>
      <div class="db-order-foot">${statusBadge(o.status)}</div>
    </div>`;
  }).join("");
}

function openOrder(id){
  activeId=id;
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  document.getElementById("dbEmpty").style.display="none";
  document.getElementById("dbOrderHead").style.display="flex";
  document.getElementById("dbInputWrap").style.display="block";
  document.getElementById("dbCustName").textContent=o.name||"—";
  document.getElementById("dbInfoGrid").innerHTML=`
    <div class="db-info-tag">📱 <strong>${o.phone||"—"}</strong></div>
    <div class="db-info-tag">🎮 ID: <strong>${o.gameId||"—"}</strong></div>
    <div class="db-info-tag">📦 <strong>${o.pkg||"—"}</strong></div>
    <div class="db-info-tag">💰 <strong>${(o.price||0).toLocaleString()} جنيه</strong></div>
    ${statusBadge(o.status)}
    <a class="db-info-tag" href="https://wa.me/2${(o.phone||"").replace(/^0/,"")}" target="_blank" style="color:var(--green);text-decoration:none;cursor:pointer;">📞 واتساب</a>
  `;
  renderMsgs(o.msgs||[]);
  renderList();
}

function renderMsgs(msgs){
  const body=document.getElementById("dbMsgs");
  body.innerHTML=msgs.map(m=>{
    if(m.from==="system")return`<div class="bubble sys">${m.text}</div>`;
    if(m.from==="admin")return`<div class="bubble store"><div class="sender">أنت</div>${m.text}</div>`;
    return`<div class="bubble me">${m.text}</div>`;
  }).join("");
  body.scrollTop=body.scrollHeight;
}

function setStatus(s){
  if(!activeId)return;
  const o=orders.find(x=>x.id===activeId);
  if(!o)return;
  o.status=s;
  o.msgs=o.msgs||[];
  o.msgs.push({from:"system",text:s==="confirmed"?"✅ تم تأكيد الطلب":"🎉 تم توصيل الشدات بنجاح",ts:Date.now()});

  // Send Telegram notification to admin about status change
  sendTgMsg(`📌 طلب *${o.id}* — تم تغيير الحالة إلى: *${s==="confirmed"?"مؤكد":"منجز"}*`);

  saveOrders();updateStats();renderList();openOrder(activeId);
}

function dbSend(){
  const inp=document.getElementById("dbMsgIn");
  const text=inp.value.trim();
  if(!text||!activeId)return;
  inp.value="";inp.style.height="";
  const o=orders.find(x=>x.id===activeId);
  if(!o)return;
  o.msgs=o.msgs||[];
  o.msgs.push({from:"admin",text,ts:Date.now()});
  saveOrders();renderMsgs(o.msgs);
}

async function sendTgMsg(text){
  try{
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:TG_CHAT,text,parse_mode:"Markdown"})
    });
  }catch(e){}
}

/* ── RECEIVE ORDERS ── */
// Orders are saved to localStorage by app.js when submitted
// We need to hook into the submitOrder function
// Override window.onOrderPlaced from app.js context via storage event
window.addEventListener("storage",e=>{
  if(e.key===ORDERS_KEY){loadOrders();}
});
</script>
</body>
</html>
